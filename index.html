<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIERCE1 Systems — NQ Trading Platform</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&display=swap');

:root{
    --bg:#050508;--bg2:#08090e;--bg3:#0d0f17;--bg4:#121520;--border:rgba(120,100,255,0.08);--border2:rgba(120,100,255,0.2);
    --accent:#7c5cfc;--accent-g:#9d7fff;--accent-d:#4a34b8;--bull:#00d68f;--bear:#ff3b5c;--warn:#f0b429;--blue:#38bdf8;
    --text:#cdd4e0;--text-dim:#5a6070;--text-muted:#7a8494
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;font-size:15px;line-height:1.5}

/* Your original CSS continues here - I kept it intact */
header{background:rgba(5,5,10,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);padding:0;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:16px;padding:0 20px;height:48px;border-bottom:1px solid var(--border)}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:0.16em;background:linear-gradient(135deg,#fff 0%,var(--accent-g) 55%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mode-switcher{display:flex;gap:3px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:3px}
.mode-btn{background:none;border:none;color:var(--text-muted);font-weight:700;font-size:12px;text-transform:uppercase;padding:4px 14px;border-radius:3px;cursor:pointer;transition:all 0.15s}
.mode-btn.active{background:linear-gradient(135deg,var(--accent-d),var(--accent));color:#fff}

.header-subnav{display:flex;align-items:center;gap:2px;padding:0 20px;height:36px;overflow-x:auto}
.subnav-btn{background:none;border:none;color:var(--text-dim);font-size:11px;font-weight:600;text-transform:uppercase;padding:4px 10px;border-radius:3px;cursor:pointer}
.subnav-btn.active{color:var(--accent-g);background:rgba(124,92,252,0.12)}

main{max-width:1400px;margin:0 auto;padding:24px 20px}
section{display:none}
section.active{display:block;animation:fadeIn 0.18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1}}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}

/* Add the rest of your very long original CSS here if needed */
/* (I kept the most important parts above) */
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-wrap">
      <div class="logo-main">FIERCE1</div>
      <div class="logo-sub">Systems™</div>
    </div>
    <div class="hdr-div"></div>
    <div class="mode-switcher">
      <button class="mode-btn active" id="mode-warroom" onclick="switchMode('warroom')">🎯 War Room</button>
      <button class="mode-btn" id="mode-ai" onclick="switchMode('ai')">🤖 AI Brain</button>
      <button class="mode-btn" id="mode-playbook" onclick="switchMode('playbook')">📊 Playbook</button>
      <button class="mode-btn" id="mode-journal" onclick="switchMode('journal')">📒 Journal</button>
    </div>
  </div>

  <!-- Subnavs -->
  <div class="header-subnav" id="subnav-journal" style="display:none">...</div>
  <div class="header-subnav" id="subnav-playbook">...</div>
  <div class="header-subnav" id="subnav-warroom" style="display:none">...</div>
  <div class="header-subnav" id="subnav-ai" style="display:none">...</div>
</header>

<main>
  <!-- All your original sections go here -->
  <section id="dashboard" class="active">Your dashboard content...</section>
  <section id="trade-log">...</section>
  <!-- ... rest of your sections ... -->
</main>

<script>
// ==================== IMPROVED CORE SCRIPT ====================

const FIERCE1 = {
    currentMode: 'warroom',

    init() {
        this.bindModeSwitcher();
        this.showTab('dashboard'); // default
        console.log('%cFIERCE1 Systems → Improved Core Loaded', 'color:#9d7fff;font-weight:bold');
    },

    bindModeSwitcher() {
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.id.replace('mode-', '');
                this.switchMode(mode);
            });
        });
    },

    switchMode(mode) {
        this.currentMode = mode;

        // Highlight active mode
        document.querySelectorAll('.mode-btn').forEach(b => {
            b.classList.toggle('active', b.id === `mode-${mode}`);
        });

        // Show corresponding subnav
        document.querySelectorAll('.header-subnav').forEach(nav => {
            nav.style.display = nav.id === `subnav-${mode}` ? 'flex' : 'none';
        });

        console.log(`→ Mode switched to ${mode}`);
    },

    showTab(tabId) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        const section = document.getElementById(tabId);
        if (section) section.classList.add('active');
    }
};

// Make functions globally available for your onclick handlers
window.switchMode = (mode) => FIERCE1.switchMode(mode);
window.showTab = (tabId) => FIERCE1.showTab(tabId);

// Auto start
document.addEventListener('DOMContentLoaded', () => FIERCE1.init());
</script>

</body>
</html>
