<!DOCTYPE html>
<html>
<head>
  <title>Simple Button Test</title>
</head>
<body style="background:#111; color:white; padding:40px; font-family:sans-serif;">

  <h2>Simple Button Test</h2>
  <button onclick="alert('Button works!')" style="padding:15px 30px; font-size:18px;">
    Click Me
  </button>

  <p id="msg" style="margin-top:30px;"></p>

  <script>
    document.getElementById('msg').textContent = 'JavaScript is running.';
  </script>

</body>
</html>
