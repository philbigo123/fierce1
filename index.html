<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CROC1 Systems — NQ Trading Platform</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Saira:wght@400;500;600;700&family=Saira+Condensed:wght@600;700&display=swap');

:root {
  --bg: #0a0e0c;
  --bg2: #111814;
  --bg3: #16201b;
  --border: rgba(79,174,106,0.18);
  --accent: #4fae6a;
  --accent-g: #62c184;
  --bull: #d6ad4e;
  --bear: #e0524f;
  --text: #e9f0ea;
  --text-dim: #7d8d83;
  --text-muted: #566159;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Saira', sans-serif;
  min-height: 100vh;
  font-size: 15px;
}

header {
  background: rgba(5,5,10,0.95);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.logo {
  font-family: 'Saira Condensed', sans-serif;
  font-size: 26px;
  letter-spacing: 0.12em;
  background: linear-gradient(135deg, #fff, var(--accent-g));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.now-bar {
  margin-left: auto;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  gap: 18px;
}

main {
  max-width: 1480px;
  margin: 0 auto;
  padding: 24px;
}

.grid {
  display: grid;
  grid-template-columns: 1.7fr 1fr;
  gap: 20px;
}

@media (max-width: 1100px) {
  .grid { grid-template-columns: 1fr; }
}

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
}

.card-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

#tape {
  height: 420px;
  overflow-y: auto;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  line-height: 1.6;
  color: var(--accent-g);
}

.level-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px dashed rgba(255,255,255,0.05);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
}

.status {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 8px;
}
</style>
</head>
<body>

<header>
  <div class="logo">CROC1</div>
  <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim)">NQ INTRADAY</div>
  <div class="now-bar">
    <span id="clock">—</span>
    <span id="status">Connecting...</span>
  </div>
</header>

<main>
  <div class="grid">
    <!-- Left -->
    <div style="display:flex;flex-direction:column;gap:20px">
      <div class="card">
        <div class="card-title">Latest Levels (from alerts_raw)</div>
        <div id="levels">Loading levels from Supabase...</div>
        <div class="status" id="levels-status"></div>
      </div>

      <div class="card">
        <div class="card-title">Live Tape / Recent Alerts</div>
        <div id="tape">Connecting to feed...</div>
      </div>
    </div>

    <!-- Right -->
    <div style="display:flex;flex-direction:column;gap:20px">
      <div class="card">
        <div class="card-title">Session Snapshot</div>
        <div id="snapshot">Waiting for data...</div>
      </div>

      <div class="card">
        <div class="card-title">Quick Actions</div>
        <button onclick="loadLatest()" style="background:var(--accent);color:#0a0e0c;border:none;padding:10px 18px;border-radius:6px;font-weight:700;cursor:pointer;width:100%">
          Refresh Levels
        </button>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ========== YOUR SUPABASE ==========
  const SUPABASE_URL = 'https://yazqfrlpefuijfodzdiu.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_iPaW9l3NDtPoa1ddJthsNA_tliL2HUE';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ========== CORE FUNCTIONS ==========
  async function loadLatest() {
    document.getElementById('status').textContent = 'Loading...';
    document.getElementById('levels-status').textContent = 'Querying alerts_raw...';

    try {
      const { data, error } = await supabase
        .from('alerts_raw')
        .select('message, received_at')
        .order('received_at', { ascending: false })
        .limit(15);

      if (error) throw error;

      if (!data || data.length === 0) {
        document.getElementById('levels').innerHTML = '<span style="color:var(--text-muted)">No alerts found in alerts_raw</span>';
        document.getElementById('tape').innerHTML = 'No recent alerts';
        document.getElementById('status').textContent = 'Connected • 0 rows';
        return;
      }

      // Show latest message as levels
      const latest = data[0];
      document.getElementById('levels').innerHTML = `
        <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.7;white-space:pre-wrap">
${latest.message}
        </div>
        <div style="margin-top:12px;font-size:12px;color:var(--text-dim)">
          Received: ${new Date(latest.received_at).toLocaleString()}
        </div>
      `;

      // Fill the tape with recent messages
      let tapeHtml = '';
      data.forEach(row => {
        const time = new Date(row.received_at).toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'});
        tapeHtml += `<div style="margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.05)">
          <span style="color:var(--text-dim)">[${time}]</span><br>
          ${row.message.substring(0, 140)}${row.message.length > 140 ? '...' : ''}
        </div>`;
      });
      document.getElementById('tape').innerHTML = tapeHtml;

      document.getElementById('snapshot').innerHTML = `
        <div style="font-size:14px">
          <div style="margin-bottom:8px"><strong>Total alerts loaded:</strong> ${data.length}</div>
          <div style="color:var(--accent-g)">Latest alert is live</div>
        </div>
      `;

      document.getElementById('status').textContent = `Connected • ${data.length} alerts`;
      document.getElementById('levels-status').textContent = 'Last updated just now';
    } catch (err) {
      console.error(err);
      document.getElementById('levels').innerHTML = `<span style="color:var(--bear)">Error: ${err.message}</span>`;
      document.getElementById('status').textContent = 'Connection error';
      document.getElementById('levels-status').textContent = err.message;
    }
  }

  // Clock
  function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', {
      hour: 'numeric',
      minute: '2-digit',
      second: '2-digit'
    });
  }

  // Init
  updateClock();
  setInterval(updateClock, 1000);
  loadLatest();
</script>
</body>
</html>
